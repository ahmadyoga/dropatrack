<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 380px;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: #0a0a0a;
      color: #e5e5e5;
    }

    /* Header */
    .header {
      padding: 16px;
      background: linear-gradient(135deg, #15803d, #16a34a);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .header h1 {
      font-size: 16px;
      font-weight: 800;
      letter-spacing: -0.5px;
      color: white;
    }

    .header h1 span { color: #bbf7d0; }

    .header .icon {
      width: 24px;
      height: 24px;
      background: rgba(255,255,255,0.2);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
    }

    /* Content */
    .content { padding: 16px; }

    /* Status messages */
    .status {
      padding: 12px;
      border-radius: 10px;
      font-size: 13px;
      text-align: center;
    }

    .status.error {
      background: rgba(239, 68, 68, 0.15);
      color: #fca5a5;
      border: 1px solid rgba(239, 68, 68, 0.2);
    }

    .status.success {
      background: rgba(34, 197, 94, 0.15);
      color: #86efac;
      border: 1px solid rgba(34, 197, 94, 0.2);
    }

    .status.info {
      background: rgba(59, 130, 246, 0.1);
      color: #93c5fd;
      border: 1px solid rgba(59, 130, 246, 0.15);
    }

    /* Current Video */
    .video-card {
      background: rgba(255,255,255,0.05);
      border-radius: 12px;
      padding: 12px;
      margin-bottom: 12px;
      border: 1px solid rgba(255,255,255,0.08);
    }

    .video-card .label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #22c55e;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .video-info {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .video-info img {
      width: 80px;
      height: 45px;
      border-radius: 6px;
      object-fit: cover;
      flex-shrink: 0;
    }

    .video-info .title {
      font-size: 13px;
      font-weight: 500;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      line-height: 1.3;
    }

    /* Playlist section */
    .playlist-card {
      background: rgba(255,255,255,0.05);
      border-radius: 12px;
      padding: 12px;
      margin-bottom: 12px;
      border: 1px solid rgba(255,255,255,0.08);
    }

    .playlist-card .label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #f59e0b;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .playlist-card .count {
      font-size: 12px;
      color: #a3a3a3;
    }

    /* Room selector */
    .room-section {
      margin-bottom: 12px;
    }

    .room-section .label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #a3a3a3;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .room-tabs {
      display: flex;
      flex-direction: column;
      gap: 6px;
      max-height: 120px;
      overflow-y: auto;
    }

    .room-tab {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.15s;
      font-size: 13px;
      color: #e5e5e5;
    }

    .room-tab:hover {
      background: rgba(34, 197, 94, 0.1);
      border-color: rgba(34, 197, 94, 0.3);
    }

    .room-tab.selected {
      background: rgba(34, 197, 94, 0.15);
      border-color: #22c55e;
      color: #86efac;
    }

    .room-tab .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #22c55e;
      flex-shrink: 0;
    }

    .room-tab .slug {
      font-weight: 600;
      flex: 1;
    }

    .no-rooms {
      font-size: 12px;
      color: #737373;
      text-align: center;
      padding: 12px;
    }

    /* Buttons */
    .actions {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .btn {
      padding: 10px 16px;
      border: none;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .btn-primary {
      background: linear-gradient(135deg, #15803d, #22c55e);
      color: white;
    }

    .btn-primary:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(34, 197, 94, 0.3);
    }

    .btn-secondary {
      background: rgba(245, 158, 11, 0.15);
      color: #fbbf24;
      border: 1px solid rgba(245, 158, 11, 0.3);
    }

    .btn-secondary:hover:not(:disabled) {
      background: rgba(245, 158, 11, 0.25);
    }

    .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Footer */
    .footer {
      padding: 10px 16px;
      text-align: center;
      font-size: 11px;
      color: #525252;
      border-top: 1px solid rgba(255,255,255,0.05);
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="icon">🎵</div>
    <h1>Drop<span>A</span>Track</h1>
  </div>

  <div class="content" id="content">
    <div class="status info" id="loading">Detecting YouTube page...</div>
  </div>

  <div class="footer">
    💡 Selected room also activates inline buttons on YouTube playlists<br>
    dropatrack.vercel.app
  </div>

  <script src="popup.js"></script>
</body>
</html>
