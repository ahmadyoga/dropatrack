<!DOCTYPE html>
<html lang="en" data-theme="dark" data-type="scifi" data-accent="nebula">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>DropATrack — Share Card</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Bungee&family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
<style>
:root{
  --pop-yellow:#ffd23f;
  --pop-magenta:#ff5da2;
  --pop-cyan:#46e0d4;
  --pop-violet:#9d7bff;
  --pop-coral:#ff7a4d;
  --pop-lime:#b6f24d;

  --font-display:'Bungee', system-ui, sans-serif;
  --font-body:'Space Grotesk', system-ui, sans-serif;
  --font-mono:'Space Mono', monospace;

  --bg:#14101f;
  --bg-grad-1:#241640;
  --bg-grad-2:#10101f;
  --panel:#241c3a;
  --panel-2:#2d2348;
  --panel-3:#352a55;
  --ink:#f7eeda;
  --ink-soft:#b9acd6;
  --ink-dim:#8a7db0;
  --outline:#0b0814;
  --shadow:#070510;
  --star:#fff4d0;
  --line:rgba(247,238,218,.14);

  --accent:var(--pop-magenta);
  --accent-2:var(--pop-cyan);
  --accent-3:var(--pop-yellow);

  --r-wobble:18px 22px 20px 24px / 24px 18px 22px 20px;
  --r-pill:40px;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{background:#05030c;}
body{display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:var(--font-body);}

/* ---- 1200x630 OG canvas ---- */
.og{
  position:relative;
  width:1200px;height:630px;
  overflow:hidden;
  background:
    radial-gradient(120% 90% at 84% -12%, var(--bg-grad-1) 0%, transparent 55%),
    radial-gradient(110% 80% at -6% 112%, #2a1850 0%, transparent 52%),
    var(--bg);
  color:var(--ink);
  -webkit-font-smoothing:antialiased;
}

/* starfield */
.star{position:absolute;background:var(--star);border-radius:50%;}
.plus{position:absolute;}
.plus svg{display:block;}

.display{font-family:var(--font-display);font-weight:400;line-height:1.02;}
.mono{font-family:var(--font-mono);}
.row{display:flex;align-items:center;}

.chip{
  font-family:var(--font-mono);font-size:14px;font-weight:700;
  text-transform:uppercase;letter-spacing:.08em;
  border:2.5px solid var(--outline);border-radius:var(--r-pill);
  padding:7px 16px;display:inline-flex;align-items:center;gap:8px;
  background:var(--panel);white-space:nowrap;
}
.live-dot{width:12px;height:12px;border-radius:50%;background:var(--pop-magenta);border:2.5px solid var(--outline);}

.pop{border:3px solid var(--outline);box-shadow:9px 9px 0 var(--shadow);background:var(--panel);}
.wobble{border-radius:var(--r-wobble);}

/* ===== layout ===== */
.frame{position:absolute;inset:0;padding:56px 60px;display:flex;flex-direction:column;justify-content:space-between;z-index:2;}

/* top bar */
.topbar{display:flex;align-items:flex-start;justify-content:space-between;}
.logo{display:flex;align-items:center;gap:16px;}
.logo .mark{position:relative;width:58px;height:58px;flex:none;}
.logo .ring{position:absolute;inset:0;border-radius:50%;border:3px solid var(--outline);background:var(--accent-3);box-shadow:3px 3px 0 var(--shadow);}
.logo .core{position:absolute;left:50%;top:50%;width:19px;height:19px;transform:translate(-50%,-50%);border-radius:50%;background:var(--accent);border:3px solid var(--outline);}
.logo .orbit{position:absolute;top:-4px;left:50%;width:12px;height:12px;margin-left:-6px;border-radius:50%;background:var(--accent-2);border:2.5px solid var(--outline);}
.logo .name{font-family:var(--font-display);font-size:34px;line-height:.9;}
.logo .name .a{color:var(--accent);}

.listeners-chip{background:var(--accent);color:#140f1f;border-color:var(--outline);font-size:15px;padding:8px 16px;}

/* center content */
.center{display:flex;align-items:center;gap:48px;}
.left{flex:1;min-width:0;}
.kicker{background:var(--accent-3);color:#140f1f;transform:rotate(-2deg);margin-bottom:22px;}
.headline{font-size:42px;color:var(--ink-soft);font-weight:600;letter-spacing:.01em;margin-bottom:14px;}
.roomname{font-family:var(--font-display);font-size:74px;line-height:.98;text-wrap:balance;margin-bottom:24px;}
.roomname .hl{color:var(--accent);-webkit-text-stroke:2px var(--outline);}
.hostline{display:flex;align-items:center;gap:14px;}
.host-avatars{display:flex;}
.host-avatars svg{margin-left:-12px;border-radius:50%;}
.host-avatars svg:first-child{margin-left:0;}
.hostmeta{font-size:19px;font-weight:600;color:var(--ink-soft);}
.hostmeta b{color:var(--ink);font-weight:700;}

/* now playing card */
.np{width:330px;flex:none;padding:0;overflow:hidden;display:flex;flex-direction:column;box-shadow:9px 9px 0 var(--accent);}
.np .art{position:relative;height:200px;overflow:hidden;
  background:radial-gradient(120% 120% at 25% 15%, oklch(0.6 0.2 285) 0%, oklch(0.42 0.18 325) 60%, oklch(0.28 0.12 5) 100%);}
.np .rings{position:absolute;inset:0;width:100%;height:100%;opacity:.5;}
.np .vinyl{position:absolute;left:12%;bottom:-30%;width:64%;aspect-ratio:1;border-radius:50%;
  background:repeating-radial-gradient(circle at center,#14101f 0 4px,oklch(0.32 0.1 285) 4px 8px);
  border:3px solid var(--outline);box-shadow:inset 0 0 0 9px rgba(255,255,255,.05);}
.np .vinyl .hole{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:22%;aspect-ratio:1;border-radius:50%;background:oklch(0.7 0.2 285);border:2.5px solid var(--outline);}
.np .nowtag{position:absolute;top:14px;left:14px;background:rgba(20,15,31,.78);color:#fff;border:2px solid rgba(255,255,255,.4);
  font-family:var(--font-mono);font-size:12px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;padding:5px 11px;border-radius:8px;}
.np .meta{padding:18px 20px 20px;}
.np .eq{display:flex;align-items:flex-end;gap:4px;height:18px;margin-bottom:12px;}
.np .eq span{width:5px;background:var(--accent);border-radius:2px;}
.np .track{font-size:22px;font-weight:700;line-height:1.12;margin-bottom:5px;text-wrap:balance;}
.np .artist{font-family:var(--font-mono);font-size:13px;color:var(--ink-dim);text-transform:uppercase;letter-spacing:.08em;}

/* bottom share bar */
.sharebar{display:flex;align-items:center;justify-content:space-between;gap:20px;}
.urlpill{display:flex;align-items:center;gap:14px;background:var(--panel);border:3px solid var(--outline);border-radius:var(--r-pill);
  box-shadow:5px 5px 0 var(--shadow);padding:13px 22px 13px 16px;}
.urlpill .glyph{width:34px;height:34px;flex:none;border-radius:50%;background:var(--accent-2);border:2.5px solid var(--outline);display:flex;align-items:center;justify-content:center;}
.urlpill .u{font-family:var(--font-mono);font-size:19px;font-weight:700;letter-spacing:.01em;}
.urlpill .u .dim{color:var(--ink-dim);}
.cta{font-family:var(--font-display);font-size:18px;background:var(--accent);color:#140f1f;border:3px solid var(--outline);
  box-shadow:5px 5px 0 var(--shadow);border-radius:16px;padding:14px 24px;display:inline-flex;align-items:center;gap:10px;}
</style>
</head>
<body>
<div class="og" id="og">

  <!-- starfield -->
  <div id="stars"></div>

  <div class="frame">

    <!-- top bar -->
    <div class="topbar">
      <div class="logo">
        <div class="mark">
          <div class="ring"></div>
          <div class="core"></div>
          <div class="orbit"></div>
        </div>
        <div class="name">Drop<span class="a">A</span>Track</div>
      </div>
      <div class="row" style="gap:12px;">
        <span class="chip"><span class="live-dot"></span>LIVE NOW</span>
        <span class="chip listeners-chip">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#140f1f" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="8" r="3.2"/><path d="M3.5 19a5.5 5.5 0 0 1 11 0"/><path d="M16 5.5a3 3 0 0 1 0 5.6"/><path d="M20.5 19a5 5 0 0 0-3.5-4.8"/></svg>
          42 LISTENING
        </span>
      </div>
    </div>

    <!-- center -->
    <div class="center">
      <div class="left">
        <span class="chip kicker">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="#140f1f"><path d="M13 2 4 14h6l-1 8 9-12h-6z"/></svg>
          you're invited to tune in
        </span>
        <div class="headline">Same queue. Same beat.</div>
        <div class="roomname">Late&nbsp;Night<br/><span class="hl">Launchpad</span></div>
        <div class="hostline">
          <div class="host-avatars" id="avatars"></div>
          <div class="hostmeta">hosted by <b>@NovaKat</b> · lofi cosmic</div>
        </div>
      </div>

      <!-- now playing card -->
      <div class="np pop wobble">
        <div class="art">
          <svg class="rings" viewBox="0 0 100 100" preserveAspectRatio="none">
            <circle cx="72" cy="26" r="42" fill="none" stroke="#fff" stroke-width="1.4" opacity="0.35"/>
            <circle cx="72" cy="26" r="30" fill="none" stroke="#fff" stroke-width="1.4" opacity="0.28"/>
            <circle cx="72" cy="26" r="18" fill="none" stroke="#fff" stroke-width="1.4" opacity="0.21"/>
          </svg>
          <div class="vinyl"><div class="hole"></div></div>
          <div class="nowtag">▸ now playing</div>
        </div>
        <div class="meta">
          <div class="eq">
            <span style="height:8px"></span><span style="height:16px"></span><span style="height:11px"></span><span style="height:18px"></span><span style="height:7px"></span>
          </div>
          <div class="track">Stardust in My Headphones</div>
          <div class="artist">lofi.galaxy</div>
        </div>
      </div>
    </div>

    <!-- bottom share bar -->
    <div class="sharebar">
      <div class="urlpill">
        <div class="glyph">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#140f1f" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7 0l3-3a5 5 0 0 0-7-7l-1.5 1.5"/><path d="M14 11a5 5 0 0 0-7 0l-3 3a5 5 0 0 0 7 7l1.5-1.5"/></svg>
        </div>
        <div class="u"><span class="dim">dropatrack.fm/r/</span>late-night-launchpad</div>
      </div>
      <div class="cta">
        TAP TO JOIN
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#140f1f" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h13"/><path d="m12 5 7 7-7 7"/></svg>
      </div>
    </div>

  </div>
</div>

<script>
// ---- deterministic starfield ----
(function(){
  let s = 7*9301+49297;
  const rnd = ()=>{ s=(s*9301+49297)%233280; return s/233280; };
  const host = document.getElementById('stars');
  for(let i=0;i<34;i++){
    const x=rnd()*100, y=rnd()*100, sz=3+rnd()*7, isPlus=rnd()>0.72;
    if(isPlus){
      const d=document.createElement('div');
      d.className='plus';
      d.style.left=x+'%'; d.style.top=y+'%';
      d.innerHTML='<svg width="'+(sz*2)+'" height="'+(sz*2)+'" viewBox="0 0 10 10"><path d="M5 0v10M0 5h10" stroke="var(--star)" stroke-width="2" stroke-linecap="round"/></svg>';
      host.appendChild(d);
    }else{
      const d=document.createElement('div');
      d.className='star';
      d.style.left=x+'%'; d.style.top=y+'%';
      d.style.width=sz+'px'; d.style.height=sz+'px';
      d.style.opacity=(0.4+rnd()*0.6).toFixed(2);
      host.appendChild(d);
    }
  }
})();

// ---- cartoon avatars (matches app avatarFor style) ----
(function(){
  function avatarFor(seed){
    let h=0; for(let i=0;i<seed.length;i++){ h=(h*31+seed.charCodeAt(i))>>>0; }
    const types=['planet','blob','star','moon'];
    return { hue:h%360, type:types[h%types.length], ring:(h>>3)%3===0, eyes:(h>>5)%4, mouth:(h>>7)%4, spots:(h>>9)%2===0, rot:((h>>11)%14)-7 };
  }
  function svgFor(seed, size){
    const a=avatarFor(seed);
    const c='oklch(0.72 0.17 '+a.hue+')';
    const c2='oklch(0.58 0.18 '+a.hue+')';
    const cx=24,cy=24,R=16,eyeY=a.type==='star'?23:22;
    let g='';
    if(a.ring) g+='<ellipse cx="'+cx+'" cy="'+cy+'" rx="21" ry="8" fill="none" transform="rotate(-18 '+cx+' '+cy+')"/>';
    if(a.type==='star') g+='<polygon points="24,6 29,19 43,19 31,27 36,41 24,32 12,41 17,27 5,19 19,19" fill="'+c+'"/>';
    else g+='<circle cx="'+cx+'" cy="'+cy+'" r="'+R+'" fill="'+c+'"/>';
    if(a.spots&&a.type!=='star') g+='<g fill="'+c2+'" stroke="none"><circle cx="16" cy="18" r="2.4"/><circle cx="31" cy="28" r="3"/><circle cx="29" cy="16" r="1.8"/></g>';
    if(a.eyes===3) g+='<circle cx="24" cy="'+eyeY+'" r="3.4" fill="#fff"/><circle cx="24" cy="'+(eyeY+0.5)+'" r="1.5" fill="#140f1f" stroke="none"/>';
    else g+='<circle cx="19" cy="'+eyeY+'" r="3.1" fill="#fff"/><circle cx="29" cy="'+eyeY+'" r="3.1" fill="#fff"/><circle cx="'+(a.eyes===1?20:19)+'" cy="'+(eyeY+0.6)+'" r="1.4" fill="#140f1f" stroke="none"/><circle cx="'+(a.eyes===1?30:29)+'" cy="'+(eyeY+0.6)+'" r="1.4" fill="#140f1f" stroke="none"/>';
    if(a.mouth===0) g+='<path d="M19 '+(eyeY+6)+' q5 4 10 0" fill="none"/>';
    else if(a.mouth===1) g+='<path d="M20 '+(eyeY+7)+' q4 -3 8 0" fill="none"/>';
    else if(a.mouth===2) g+='<circle cx="24" cy="'+(eyeY+6)+'" r="2.3" fill="#140f1f" stroke="none"/>';
    else g+='<path d="M20 '+(eyeY+6)+' h8" fill="none"/>';
    return '<svg viewBox="0 0 48 48" width="'+size+'" height="'+size+'" style="transform:rotate('+a.rot+'deg);background:var(--panel);"><g stroke="var(--outline)" stroke-width="2.6" stroke-linejoin="round">'+g+'</g></svg>';
  }
  const seeds=['NovaKat','wormhole99','cosmotina','pulsarpete','lilmeteor'];
  const host=document.getElementById('avatars');
  host.innerHTML = seeds.map(s=>'<span style="border:3px solid var(--outline);border-radius:50%;display:inline-flex;box-shadow:2px 2px 0 var(--shadow);">'+svgFor(s,52)+'</span>').join('');
})();
</script>
</body>
</html>
